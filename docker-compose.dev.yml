# Local dev infrastructure for namecard-web Phase 1+
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#
# Services:
#   typesense   — Full-text search (CJK tokenizer) on :8108

services:
  typesense:
    image: typesense/typesense:28.0
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: >-
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-local-dev-only-key}
      --listen-port 8108
      --enable-cors
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8108/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  typesense-data:
    driver: local
