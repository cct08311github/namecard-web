name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build / Lint / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm test:coverage
      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  rules:
    name: Firestore Rules Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:rules

  sit:
    name: System Integration Tests (Firebase emulators)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      typesense:
        image: typesense/typesense:28.0
        ports:
          - "8108:8108"
        env:
          TYPESENSE_API_KEY: local-dev-only-key
          # /tmp always exists in any Linux image so the data-dir arg
          # doesn't fail the --data-dir existence check. Ephemeral is
          # fine for CI — the suite resets the collection per test.
          TYPESENSE_DATA_DIR: /tmp
          TYPESENSE_ENABLE_CORS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - run: pnpm install --frozen-lockfile
      - name: Wait for Typesense to be ready
        run: |
          echo "Waiting for Typesense on port 8108..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8108/health | grep -q '"ok":true'; then
              echo "Typesense is ready."
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 2s"
            sleep 2
          done
          echo "Typesense did not become ready in time." >&2
          exit 1
      - run: pnpm test:sit
        env:
          TYPESENSE_HOST: "127.0.0.1"
          TYPESENSE_PORT: "8108"
          TYPESENSE_PROTOCOL: "http"
          TYPESENSE_API_KEY: "local-dev-only-key"
          FIREBASE_ADMIN_PROJECT_ID: "demo-namecard-sit"
          GCLOUD_PROJECT: "demo-namecard-sit"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "demo-namecard-sit"
          NEXT_PUBLIC_FIREBASE_API_KEY: "emulator-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "demo-namecard-sit.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "demo-namecard-sit.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "0:0:web:0"

  e2e:
    name: Playwright E2E (auth-gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
      - run: pnpm exec playwright test e2e/auth-gate.spec.ts
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-auth
          path: playwright-report/
          retention-days: 7

  e2e-crud:
    name: Playwright E2E (CRUD via emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
      - name: Build Next.js production bundle
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Run CRUD E2E against emulator
        run: |
          pnpm exec firebase emulators:exec \
            --only firestore,auth \
            --project demo-namecard-sit \
            "pnpm exec playwright test e2e/cards-crud.spec.ts e2e/search.spec.ts e2e/import.spec.ts e2e/export.spec.ts e2e/tag-suggest.spec.ts"
        env:
          E2E_TEST_MODE: "1"
          ALLOWED_EMAILS: "e2e-alice@example.com"
          FIREBASE_ADMIN_PROJECT_ID: "demo-namecard-sit"
          GCLOUD_PROJECT: "demo-namecard-sit"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "demo-namecard-sit"
          NEXT_PUBLIC_FIREBASE_API_KEY: "emulator-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "demo-namecard-sit.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "demo-namecard-sit.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "0:0:web:0"
          SESSION_COOKIE_SECRET: "dummy-e2e-secret-at-least-32-chars-long"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"
          NEXT_TELEMETRY_DISABLED: "1"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-crud
          path: playwright-report/
          retention-days: 7
